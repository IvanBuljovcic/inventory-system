version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory-system_dev
      POSTGRES_USER: inventory-system_user
      POSTGRES_PASSWORD: inventory-system_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inventory-system_user -d inventory-system_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
